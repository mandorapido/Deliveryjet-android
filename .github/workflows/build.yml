name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Download Gradle Wrapper
      run: |
        ./gradlew --version || (curl -L https://services.gradle.org/distributions/gradle-8.0-bin.zip -o gradle.zip && unzip gradle.zip && ./gradle-8.0/bin/gradle --version)
    
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: app/build/outputs/apk/release/app-release.apk
